name: autolotto
description: "로또 6/45 자동 구매 & 당첨 확인 앱"
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  dio: ^5.7.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.4
  android_alarm_manager_plus: ^4.0.4
  flutter_foreground_task: ^8.12.0
  flutter_local_notifications: ^18.0.1
  pointycastle: ^3.9.1
  intl: ^0.20.2
  url_launcher: ^6.3.1
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  flutter_native_splash: ^2.4.4

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/autolotto_icon.png
